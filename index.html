<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Professional CV Builder</title>

    <link rel="stylesheet" href="style.css">

    <!-- PDF Download Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="container">

        <!-- FORM SECTION -->
        <div class="form-section">

            <h2>Create Your CV</h2>

            <input type="text" id="name" placeholder="Full Name">

            <input type="text" id="jobTitle" placeholder="Job Title">

            <input type="email" id="email" placeholder="Email Address">

            <input type="text" id="phone" placeholder="Phone Number">

            <input type="text" id="location" placeholder="Location">

            <textarea id="summary" placeholder="Professional Summary"></textarea>

            <textarea id="skills" placeholder="Skills (Separate with commas)"></textarea>

            <textarea id="education" placeholder="Education"></textarea>

            <textarea id="experience" placeholder="Work Experience"></textarea>

            <textarea id="projects" placeholder="Projects"></textarea>

            <div class="button-group">
                <button onclick="saveCV()">Save CV</button>
                <button onclick="downloadCV()">Download PDF</button>
                <button onclick="clearCV()">Clear</button>
            </div>

        </div>

        <!-- CV PREVIEW -->
        <div class="cv-preview" id="cv">

            <div class="header">
                <h1 id="previewName">Your Name</h1>
                <h3 id="previewJobTitle">Job Title</h3>

                <p>
                    <span id="previewEmail"></span> |
                    <span id="previewPhone"></span> |
                    <span id="previewLocation"></span>
                </p>
            </div>

            <div class="section">
                <h2>Professional Summary</h2>
                <p id="previewSummary"></p>
            </div>

            <div class="section">
                <h2>Skills</h2>
                <ul id="previewSkills"></ul>
            </div>

            <div class="section">
                <h2>Education</h2>
                <p id="previewEducation"></p>
            </div>

            <div class="section">
                <h2>Experience</h2>
                <p id="previewExperience"></p>
            </div>

            <div class="section">
                <h2>Projects</h2>
                <p id="previewProjects"></p>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
